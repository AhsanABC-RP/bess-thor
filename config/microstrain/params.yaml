# MicroStrain GQ7 IMU Parameters
# Thor: Direct USB connection (no Moxa)
# Main port: /dev/ttyACM0, Aux port: /dev/ttyACM1
microstrain_imu:
  ros__parameters:
    port: "/dev/ttyACM0"
    aux_port: "/dev/ttyACM1"
    baudrate: 115200
    imu_frame_id: "imu_link"
    publish_imu: true
    publish_mag: true
    imu_data_rate: 100

    # GNSS
    publish_gnss1: true
    publish_gnss2: true

    # Filtered output
    publish_filter: true
    filter_odometry_earth_data_rate: 10
    filter_odometry_map_data_rate: 10
