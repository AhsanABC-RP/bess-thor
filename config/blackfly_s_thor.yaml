#
# Blackfly S config for Thor — BayerRG8, 5fps, long auto exposure
#
parameters:
  - name: pixel_format
    type: enum
    node: ImageFormatControl/PixelFormat
  - name: binning_x
    type: int
    node: ImageFormatControl/BinningHorizontal
  - name: binning_y
    type: int
    node: ImageFormatControl/BinningVertical
  - name: image_width
    type: int
    node: ImageFormatControl/Width
  - name: image_height
    type: int
    node: ImageFormatControl/Height
  - name: gain_auto
    type: enum
    node: AnalogControl/GainAuto
  - name: gain
    type: float
    node: AnalogControl/Gain
  - name: device_link_throughput_limit
    type: int
    node: DeviceControl/DeviceLinkThroughputLimit
  - name: gev_scps_packet_size
    type: int
    node: TransportLayerControl/GigEVision/GevSCPSPacketSize
  - name: gev_scpd
    type: int
    node: TransportLayerControl/GigEVision/GevSCPD
  - name: exposure_auto
    type: enum
    node: AcquisitionControl/ExposureAuto
  - name: exposure_time
    type: float
    node: AcquisitionControl/ExposureTime
  - name: frame_rate_enable
    type: bool
    node: AcquisitionControl/AcquisitionFrameRateEnable
  - name: frame_rate
    type: float
    node: AcquisitionControl/AcquisitionFrameRate
  - name: frame_rate_auto
    type: enum
    node: AcquisitionControl/AcquisitionFrameRateAuto
  - name: trigger_mode
    type: enum
    node: AcquisitionControl/TriggerMode
  - name: chunk_mode_active
    type: bool
    node: ChunkDataControl/ChunkModeActive
  - name: chunk_selector_frame_id
    type: enum
    node: ChunkDataControl/ChunkSelector
  - name: chunk_enable_frame_id
    type: bool
    node: ChunkDataControl/ChunkEnable
  - name: chunk_selector_exposure_time
    type: enum
    node: ChunkDataControl/ChunkSelector
  - name: chunk_enable_exposure_time
    type: bool
    node: ChunkDataControl/ChunkEnable
  - name: chunk_selector_gain
    type: enum
    node: ChunkDataControl/ChunkSelector
  - name: chunk_enable_gain
    type: bool
    node: ChunkDataControl/ChunkEnable
  - name: chunk_selector_timestamp
    type: enum
    node: ChunkDataControl/ChunkSelector
  - name: chunk_enable_timestamp
    type: bool
    node: ChunkDataControl/ChunkEnable
  - name: stream_buffer_handling_mode
    type: enum
    node: BufferHandlingControl/StreamBufferHandlingMode
  # GevIEEE1588 must be written to the camera's GenICam tree to actually
  # enable PTP on the device. The driver's use_ieee_1588 parameter only
  # toggles its internal offset-reporting logic — it does NOT write this
  # feature. Both are required: gev_ieee_1588 (yaml-mapped) flips the
  # camera into PTP mode, use_ieee_1588 (driver param) makes the driver
  # read GevIEEE1588Status and adjust timestamps.
  - name: gev_ieee_1588
    type: bool
    node: TransportLayerControl/GigEVision/GevIEEE1588
  # gev_ieee_1588_mode=SlaveOnly prevents the camera from running BMCA and
  # occasionally re-electing itself as master, which on Thor caused the
  # PtpStatus to flap MAS↔SLV every ~10s. SlaveOnly forces the camera to
  # always follow whichever grandmaster it sees (ptp4l-mgbe0 on Thor).
  - name: gev_ieee_1588_mode
    type: enum
    node: TransportLayerControl/GigEVision/GevIEEE1588Mode
