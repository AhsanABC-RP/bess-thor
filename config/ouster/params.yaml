ouster/os_driver:
  ros__parameters:
    sensor_hostname: "169.254.70.119"
    lidar_mode: "2048x10"
    # TIME_FROM_ROS_TIME stopgap (2026-04-13 post-reboot):
    # System booted with RTC=1970; ptp4l + phc2sys initialized PHC1 from
    # that, then user fixed wall clock to 2026. phc2sys runs with -S 0
    # (never step) so PHC is pinned 56 years behind REALTIME at the
    # servo rail and will never converge. Ouster firmware slave is
    # locked to the stale GM, making /ouster/points stamps ~1970 while
    # /imu/data (GQ7) is 2026 — DLIO diverged with "Bad time sync between
    # LiDAR and IMU". Switching to ROS time realigns all sensors on wall
    # clock until PHC can be re-anchored (needs phc_ctl step + Ouster
    # firmware PTP re-acquire, ideally with a sensor power cycle).
    timestamp_mode: "TIME_FROM_ROS_TIME"
    # Driver default is -37.0 (assumes PTP time is TAI and converts to UTC by
    # subtracting the leap-second offset). Our ptp4l-bess.conf advertises
    # currentUtcOffset=0 and our PHC is disciplined to CLOCK_REALTIME (UTC)
    # via phc2sys -O 0, so the lidar packet timestamps are already in UTC.
    # Setting this to 0.0 disables the -37s subtraction and aligns Ouster
    # stamps with wall clock / other PTP sensors.
    ptp_utc_tai_offset: 0.0
    # organized: false drops no-return beams at the driver (17% of cloud on
    # OS1-128). Keeping them as NaN bloats every downstream topic and forces
    # each SLAM stack to re-filter per scan. All consumers here (FAST-LIO2,
    # DLIO, slam_map_accumulator, Foxglove) handle unorganized clouds, so
    # filtering at the source is strictly better.
    organized: false
    # Force single-return profile. OS1-128 firmware defaults to a dual-return
    # profile and the Ouster ROS 2 driver creates a parallel set of `*2` topics
    # (/ouster/points2, range_image2, reflec_image2, signal_image2) for the
    # second return — they spam the topic list and we never use them. Forcing
    # the single-return profile drops the *2 publishers entirely.
    udp_profile_lidar: "RNG19_RFL8_SIG16_NIR16"
    udp_profile_imu: "ACCEL32_GYRO32_NMEA"
    imu_packets_per_frame: 8
    gyro_fsr: "EXTENDED"
    accel_fsr: "EXTENDED"
    lidar_port: 7501
    imu_port: 7502
    proc_mask: "IMU|PCL|IMG"
    point_type: "original"
    use_system_default_qos: false
    persist_config: false
    attempt_reconnect: true
    dormant_period_between_reconnects: 5.0
