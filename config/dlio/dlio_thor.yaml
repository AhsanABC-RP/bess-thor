###########################################################
# DLIO config for Thor — Ouster OS1-128 + GQ7 IMU
###########################################################

/**:
  ros__parameters:
    use_sim_time: false
    # DLIO publishes to dlio_* frames so it doesn't fight FAST-LIO2 for
    # ownership of base_link in the TF tree. Both SLAMs can run in parallel
    # for comparison; Foxglove should point at base_link (owned by FAST-LIO2
    # via the camera_init -> body -> base_link static chain) for the primary
    # view, and at dlio_base_link for DLIO's alternative path.
    # All DLIO frames namespaced with `dlio_` to avoid TF2 multi-parent conflicts.
    # DLIO publishes `frames/baselink -> frames/lidar` and `frames/baselink -> frames/imu`,
    # so if these point at `os_lidar` / `imu_link` the Ouster driver and FAST-LIO2
    # static publishers fight DLIO for ownership of those frames and Foxglove
    # rejects the whole tree (TF2 forbids multi-parent). dlio_lidar/dlio_imu are
    # private to DLIO; they coincide with os_lidar/imu_link via map -> dlio_odom
    # static identity in launch_fast_lio_single.py.
    frames/odom: dlio_odom
    frames/baselink: dlio_base_link
    frames/lidar: dlio_lidar
    frames/imu: dlio_imu

    # Upstream params.yaml default is true — delays keyframe creation until
    # the vehicle actually moves. Prevents stale keyframes from being placed
    # during the noisy IMU-calibration window at bag start.
    map/waitUntilMove: true
    # map/dense/filtered controls which cloud is PUBLISHED on /dlio/odom_node/
    # pointcloud/deskewed — NOT DLIO's internal map accumulation. Upstream
    # comment "voxel-filter dense map" is misleading.
    # Per odom.cc:844-847: if true → publish `current_scan` (voxelized at
    # odom/preprocessing/voxelFilter/res, i.e. 0.25 m — matches GICP input).
    # If false → publish `deskewed_scan` (native density, ~131k pts/scan on
    # OS1-128, deskewed by DLIO's continuous-IMU per-point-timestamp pass).
    # GICP still runs on the voxelized current_scan either way, so SLAM
    # stability is identical. Setting false gives LAS exports ~5x more points
    # per scan with the same clean rotation/deskew DLIO renders in Foxglove.
    # Offline rerun bandwidth: ~42 MB/s → ~5 GB over 137 s drive1. Fine on
    # /mnt/bess-usb.
    map/dense/filtered: false
    map/sparse/leafSize: 0.25

    odom/gravity: 9.80665
    odom/computeTimeOffset: true

    # approximateGravity was false. Upstream params.yaml default is true.
    # DLIO odom.cc callbackImu() uses this to auto-estimate initial vehicle
    # orientation from accumulated accel (gravity direction) post-calibration
    # — decouples orientation from calibration quality so a noisy gyro bias
    # estimate doesn't propagate as orientation drift. CRITICAL for bags
    # that start in motion (rolling recorder — no stationary preamble).
    # Without it, the 13 km / 354 km/h divergence observed on 2026-04-17
    # is the direct signature of orientation drift compounding every scan.
    odom/imu/approximateGravity: true
    odom/imu/calibration/gyro: true
    odom/imu/calibration/accel: true
    # Previous pass dropped 3.0 -> 0.5 reasoning that a moving-bag calibration
    # absorbs vehicle motion as gyro bias. That's the right intuition but the
    # research agent + odom.cc source review (callbackImu()) showed bias is
    # extracted once and never re-estimated — a 0.5 s window is too noisy.
    # Compromise at 1.5 s: long enough to average IMU noise, short enough that
    # with approximateGravity=true above, orientation init doesn't depend on
    # the bias estimate being clean. Upstream default is 3.0 (stationary
    # preamble assumed).
    odom/imu/calibration/time: 1.5
    odom/imu/bufferSize: 5000

    odom/preprocessing/cropBoxFilter/size: 1.0
    # Upstream params.yaml default is 0.25. Previous value 0.10 was set for
    # visual density but stresses GICP past the scan budget on OS1-128
    # (131k pts/scan → ~80k post-filter at 0.10 vs ~25-30k at 0.25).
    #
    # 2026-04-18 retry: attempted 0.25 → 0.10 for "native density". Same
    # catastrophic divergence as the 2026-04-17 original: drive1 went from
    # 561 m cumul (at 0.25) to 5404 m cumul (at 0.10), Z extent 6 m → 2315 m,
    # max speed 16934 m/s. max_correspondence_distance 0.25 is too tight
    # relative to 0.10 m voxels for GICP to find planar structure at highway
    # speed; scan-to-scan registration converges to local minima every few
    # scans and compounds. DO NOT drop voxelFilter/res below 0.25 on this
    # rig without also retuning correspondence distance, knn, and max_iter.
    # For denser output maps use LAS-side voxel (scripts/offline_slam_to_las.py
    # --voxel 0.02) — gives 5x density without destabilizing the SLAM.
    odom/preprocessing/voxelFilter/res: 0.25

    odom/keyframe/threshD: 1.0
    odom/keyframe/threshR: 45.0

    # Upstream params.yaml defaults are 10/10/10. Halving to 5/5/5 starves
    # the submap — GICP fits against too-few keyframes, converges to local
    # minima with no leverage to correct, cumul drift explodes. Contributor
    # to the 13 km divergence on 2026-04-17.
    odom/submap/keyframe/knn: 10
    odom/submap/keyframe/kcv: 10
    odom/submap/keyframe/kcc: 10
    odom/gicp/minNumPoints: 64
    odom/gicp/kCorrespondences: 16
    # Tightened 0.5 -> 0.25. With voxelFilter/res 0.25 above, 0.5 m allowed
    # GICP correspondence matches across 2x2 voxel neighborhoods in sparse
    # or degenerate geometry (featureless hallway, open field) → converges
    # to local minima ~0.5 m off per scan. 0.25 m (~1 voxel width) keeps
    # correspondences high-confidence. DLIO does NOT skip bad registrations
    # per odom.cc getNextPose(), so this is the primary robustness knob.
    odom/gicp/maxCorrespondenceDistance: 0.25
    odom/gicp/maxIterations: 32
    odom/gicp/transformationEpsilon: 0.01
    odom/gicp/rotationEpsilon: 0.01
    odom/gicp/initLambdaFactor: 1e-9

    odom/geo/Kp: 4.5
    odom/geo/Kv: 11.25
    odom/geo/Kq: 4.0
    odom/geo/Kab: 2.25
    odom/geo/Kgb: 1.0
    odom/geo/abias_max: 5.0
    odom/geo/gbias_max: 0.5

    version: 1.1.1
    adaptive: true
    pointcloud/deskew: true
    pointcloud/voxelize: true

    imu/calibration: true
    imu/intrinsics/accel/bias: [ 0.0, 0.0, 0.0 ]
    imu/intrinsics/accel/sm:   [ 1.,  0.,  0.,
                                 0.,  1.,  0.,
                                 0.,  0.,  1. ]
    imu/intrinsics/gyro/bias: [ 0.0, 0.0, 0.0 ]

    # Ouster OS1-128 frame hierarchy (from sensor metadata for serial 122313000586):
    #   os_sensor ─ identity R, t=0     ← DLIO baselink = os_sensor
    #   os_sensor → os_lidar : Rz(180°), t = (0, 0, 0.0382) m
    #   os_sensor → os_imu   : identity R,  t = (-0.002441, -0.009725, 0.007533) m
    #
    # Prior versions had both extrinsics as identity. That meant DLIO's GICP
    # registered /ouster/points (which arrives in the os_lidar frame, i.e.
    # rotated 180° about Z from os_sensor) directly against prior keyframes
    # — the 180° residual was absorbed into the first pose and propagated as
    # a world-frame yaw. DLIO masked it via GICP robustness so it was never
    # a headline bug, but it diverged FAST-LIO2 and DLIO world frames. See
    # fast_lio_single.yaml extrinsic_R comment for the same fix on the LIO
    # side. Translation offsets are sub-cm and mostly cosmetic.
    extrinsics/baselink2imu/t: [ -0.002441, -0.009725, 0.007533 ]
    extrinsics/baselink2imu/R: [ 1.,  0.,  0.,
                                 0.,  1.,  0.,
                                 0.,  0.,  1. ]
    extrinsics/baselink2lidar/t: [ 0.0, 0.0, 0.0382 ]
    extrinsics/baselink2lidar/R: [ -1.,  0.,  0.,
                                    0., -1.,  0.,
                                    0.,  0.,  1. ]
