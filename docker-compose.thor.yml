# =============================================================================
# BESS Thor - Unified ROS2 Sensing Stack
# Thor Dev Kit (Grace Blackwell, ARM64) - Ubuntu 24.04 / CUDA 13.0
# =============================================================================
#
# Based on bess_platform production patterns with:
# - CycloneDDS (better for large messages than FastDDS)
# - Health checks on all sensors
# - Lucid Atlas 64MP support
# - Full thermal stack (A6701 x2 + A70 x2)
#
# USAGE:
#   docker compose -f docker-compose.thor.yml --profile sensors up -d
#   docker compose -f docker-compose.thor.yml --profile full up -d
#
# =============================================================================

# Common configuration - CycloneDDS instead of FastDDS
x-common: &common
  runtime: nvidia
  network_mode: host
  ipc: host
  privileged: true
  environment: &common-env
    ROS_DOMAIN_ID: "0"
    RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    CYCLONEDDS_URI: file:///config/cyclonedds.xml
    FASTRTPS_DEFAULT_PROFILES_FILE: /config/fastrtps.xml
    NVIDIA_VISIBLE_DEVICES: all
    NVIDIA_DRIVER_CAPABILITIES: all
    CUDA_VISIBLE_DEVICES: "0"
  restart: unless-stopped

x-healthcheck-ros2: &healthcheck-ros2
  interval: 30s
  timeout: 15s
  retries: 3
  start_period: 60s

services:
  # ===========================================================================
  # SENSORS - LiDAR
  # ===========================================================================
  ouster:
    <<: *common
    image: localhost/bess-ouster:jazzy
    container_name: ouster
    volumes:
      - ./config/ouster/params.yaml:/params.yaml:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash
        while true; do
          echo "[ouster] Starting driver..."
          ros2 launch ouster_ros driver.launch.py \
            params_file:=/params.yaml viz:=false || true
          echo "[ouster] Driver exited, restarting in 10s..."
          sleep 10
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "os_driver"]
    profiles:
      - lidar
      - sensors
      - dev
      - full

  # ===========================================================================
  # SENSORS - IMU (MicroStrain GQ7 via Moxa TCP)
  # ===========================================================================
  microstrain:
    <<: *common
    image: localhost/bess-microstrain:jazzy
    container_name: microstrain
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
      - /dev/ttyACM1:/dev/ttyACM1
    volumes:
      - ./config:/ros2_ws/config:ro
      - ./config/microstrain/launch_imu.py:/ros2_ws/launch_imu.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash
        exec ros2 launch /ros2_ws/launch_imu.py port:=/dev/ttyACM0 aux_port:=/dev/ttyACM1
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "microstrain_ine"]
    profiles:
      - imu
      - sensors
      - dev
      - full

  # ===========================================================================
  # SENSORS - Thermal MWIR (FLIR A6701 x2 via Spinnaker)
  # ===========================================================================
  thermal1:
    <<: *common
    image: localhost/bess-thermal-spinnaker:jazzy
    container_name: thermal1
    volumes:
      - ./dockerfiles/thermal/thermal_spinnaker_node_patched.py:/ros2_ws/thermal_spinnaker_node.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/humble/setup.bash
        source /ros2_ws/install/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        while true; do
          echo "[thermal1] Starting A6701 #1 (MAC 00:11:1c:05:8f:20)..."
          python3 /ros2_ws/thermal_spinnaker_node.py --ros-args \
            -r __ns:=/thermal/camera1 \
            -p frame_id:=thermal1_optical_frame \
            -p camera_mac:=00:11:1c:05:8f:20 || true
          echo "[thermal1] Exited, restarting in 5s..."
          sleep 5
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "python3"]
    profiles:
      - thermal
      - sensors
      - dev
      - full

  thermal2:
    <<: *common
    image: localhost/bess-thermal-spinnaker:jazzy
    container_name: thermal2
    volumes:
      - ./dockerfiles/thermal/thermal_spinnaker_node_patched.py:/ros2_ws/thermal_spinnaker_node.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/humble/setup.bash
        source /ros2_ws/install/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        while true; do
          echo "[thermal2] Starting A6701 #2 (MAC 00:11:1c:05:8f:27)..."
          python3 /ros2_ws/thermal_spinnaker_node.py --ros-args \
            -r __ns:=/thermal/camera2 \
            -p frame_id:=thermal2_optical_frame \
            -p camera_mac:=00:11:1c:05:8f:27 || true
          echo "[thermal2] Exited, restarting in 5s..."
          sleep 5
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "python3"]
    profiles:
      - thermal
      - sensors
      - dev
      - full

  # ===========================================================================
  # SENSORS - Thermal LWIR (FLIR A70 x2 via Spinnaker)
  # ===========================================================================
  thermal3:
    <<: *common
    image: localhost/bess-thermal-spinnaker:jazzy
    container_name: thermal3
    volumes:
      - ./dockerfiles/thermal/thermal_spinnaker_node_patched.py:/ros2_ws/thermal_spinnaker_node.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/humble/setup.bash
        source /ros2_ws/install/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        while true; do
          echo "[thermal3] Starting A70 #1 (MAC 00:40:7f:04:fa:7b)..."
          python3 /ros2_ws/thermal_spinnaker_node.py --ros-args \
            -r __ns:=/thermal/camera3 \
            -p frame_id:=thermal3_optical_frame \
            -p camera_mac:=00:40:7f:04:fa:7b \
            -p frame_rate:=15.0 || true
          echo "[thermal3] Exited, restarting in 5s..."
          sleep 5
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "python3"]
    profiles:
      - thermal
      - sensors
      - dev
      - full

  thermal4:
    <<: *common
    image: localhost/bess-thermal-spinnaker:jazzy
    container_name: thermal4
    volumes:
      - ./dockerfiles/thermal/thermal_spinnaker_node_patched.py:/ros2_ws/thermal_spinnaker_node.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/humble/setup.bash
        source /ros2_ws/install/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        while true; do
          echo "[thermal4] Starting A70 #2 (MAC 00:40:7f:11:04:ea)..."
          python3 /ros2_ws/thermal_spinnaker_node.py --ros-args \
            -r __ns:=/thermal/camera4 \
            -p frame_id:=thermal4_optical_frame \
            -p camera_mac:=00:40:7f:11:04:ea \
            -p frame_rate:=15.0 || true
          echo "[thermal4] Exited, restarting in 5s..."
          sleep 5
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "python3"]
    profiles:
      - thermal
      - sensors
      - dev
      - full

  # ===========================================================================
  # SENSORS - Lucid Atlas 64MP (10GigE via Arena SDK)
  # ===========================================================================
  lucid1:
    <<: *common
    image: localhost/bess-lucid:jazzy
    container_name: lucid1
    volumes:
      - ./containers/lucid/lucid_node.py:/ros2_ws/lucid_node.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash 2>/dev/null || true
        while true; do
          echo "[lucid1] Starting Lucid Atlas #1..."
          python3 /ros2_ws/lucid_node.py --ros-args \
            -p camera_ip:=169.254.20.23 \
            -p camera_name:=lucid1 \
            -p frame_id:=lucid1_optical_frame \
            -p fps:=3.0 \
            -p binning:=4 \
            -p exposure_us:=-1.0 \
            -p gain_db:=-1.0 || true
          echo "[lucid1] Exited, restarting in 5s..."
          sleep 5
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "python3"]
    profiles:
      - lucid
      - rgb
      - sensors
      - dev
      - full

  lucid2:
    <<: *common
    image: localhost/bess-lucid:jazzy
    container_name: lucid2
    volumes:
      - ./containers/lucid/lucid_node.py:/ros2_ws/lucid_node.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash 2>/dev/null || true
        while true; do
          echo "[lucid2] Starting Lucid Atlas #2..."
          python3 /ros2_ws/lucid_node.py --ros-args \
            -p camera_ip:=169.254.20.14 \
            -p camera_name:=lucid2 \
            -p frame_id:=lucid2_optical_frame \
            -p fps:=3.0 \
            -p binning:=4 \
            -p exposure_us:=-1.0 \
            -p gain_db:=-1.0 || true
          echo "[lucid2] Exited, restarting in 5s..."
          sleep 5
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "python3"]
    profiles:
      - lucid
      - rgb
      - sensors
      - dev
      - full

  compress-lucid2:
    <<: *common
    image: localhost/bess-gpu-compress:jazzy
    container_name: compress-lucid2
    volumes:
      - ./containers/cameras/gpu_compress_cuda.py:/ros2_ws/gpu_compress_cuda.py:ro
      - ./containers/cameras/nvjpeg_encoder.py:/ros2_ws/nvjpeg_encoder.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: ["bash", "-c", "source /opt/ros/humble/setup.bash && python3 /ros2_ws/gpu_compress_cuda.py --ros-args -p input_topic:=/lucid2/camera_driver/image_raw -p output_topic:=/lucid2/camera_driver/image_raw/compressed"]
    profiles: [lucid, rgb, sensors, dev, full]

  # ===========================================================================
  # SENSORS - Blackfly S (via Spinnaker)
  # ===========================================================================
  blackfly1:
    <<: *common
    image: localhost/bess-blackfly:humble
    container_name: blackfly1
    volumes:
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/blackfly_s_thor.yaml:/config/blackfly_s_thor.yaml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/humble/setup.bash
        source /ros2_ws/install/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        while true; do
          echo "[blackfly1] Starting Blackfly S #1 C++ driver (SN 25073269)..."
          ros2 run spinnaker_camera_driver camera_driver_node --ros-args \
            -r __node:=blackfly_camera -r __ns:=/blackfly/camera1 \
            -p serial_number:="'25073269'" \
            -p frame_id:=blackfly1_optical_frame \
            -p parameter_file:=/config/blackfly_s_thor.yaml \
            -p pixel_format:=BayerRG8 \
            -p frame_rate:=5.0 \
            -p frame_rate_enable:=true \
            -p frame_rate_auto:=Off \
            -p exposure_auto:=Continuous \
            -p gain_auto:=Continuous \
            -p device_link_throughput_limit:=125000000 \
            -p gev_scps_packet_size:=1400 \
            -p buffer_queue_size:=10 \
            -p trigger_mode:=Off \
            -p use_ieee_1588:=true \
            -p max_ieee_1588_offset:=0.001 \
            -p adjust_timestamp:=false \
            -p compute_brightness:=true \
            -p chunk_mode_active:=true \
            -p chunk_selector_frame_id:=FrameID \
            -p chunk_enable_frame_id:=true \
            -p chunk_selector_exposure_time:=ExposureTime \
            -p chunk_enable_exposure_time:=true \
            -p chunk_selector_gain:=Gain \
            -p chunk_enable_gain:=true \
            -p chunk_selector_timestamp:=Timestamp \
            -p chunk_enable_timestamp:=true \
            -p gev_ieee_1588:=true \
            -p gev_ieee_1588_mode:=SlaveOnly || true
          echo "[blackfly1] Exited, waiting 30s for GigE heartbeat to clear..."
          sleep 30
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "camera_driver_n"]
    profiles:
      - blackfly
      - rgb
      - sensors
      - dev
      - full

  blackfly2:
    <<: *common
    image: localhost/bess-blackfly:humble
    container_name: blackfly2
    volumes:
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/blackfly_s_thor.yaml:/config/blackfly_s_thor.yaml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/humble/setup.bash
        source /ros2_ws/install/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        while true; do
          echo "[blackfly2] Starting Blackfly S #2 C++ driver (SN 25073270)..."
          ros2 run spinnaker_camera_driver camera_driver_node --ros-args \
            -r __node:=blackfly_camera -r __ns:=/blackfly/camera2 \
            -p serial_number:="'25073270'" \
            -p frame_id:=blackfly2_optical_frame \
            -p parameter_file:=/config/blackfly_s_thor.yaml \
            -p pixel_format:=BayerRG8 \
            -p frame_rate:=5.0 \
            -p frame_rate_enable:=true \
            -p frame_rate_auto:=Off \
            -p exposure_auto:=Continuous \
            -p gain_auto:=Continuous \
            -p gev_scps_packet_size:=1400 \
            -p buffer_queue_size:=10 \
            -p trigger_mode:=Off \
            -p use_ieee_1588:=true \
            -p max_ieee_1588_offset:=0.001 \
            -p adjust_timestamp:=false \
            -p compute_brightness:=true \
            -p chunk_mode_active:=true \
            -p chunk_selector_frame_id:=FrameID \
            -p chunk_enable_frame_id:=true \
            -p chunk_selector_exposure_time:=ExposureTime \
            -p chunk_enable_exposure_time:=true \
            -p chunk_selector_gain:=Gain \
            -p chunk_enable_gain:=true \
            -p chunk_selector_timestamp:=Timestamp \
            -p chunk_enable_timestamp:=true \
            -p gev_ieee_1588:=true \
            -p gev_ieee_1588_mode:=SlaveOnly || true
          echo "[blackfly2] Exited, restarting in 10s..."
          sleep 10
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "camera_driver_n"]
    profiles:
      - blackfly
      - rgb
      - sensors
      - dev
      - full

  # ===========================================================================
  # IMAGE COMPRESSION (for Foxglove streaming)
  # ===========================================================================
  compress-thermal1:
    <<: *common
    image: localhost/bess-thermal:jazzy
    container_name: compress-thermal1
    environment:
      <<: *common-env
    volumes:
      - ./containers/cameras/gpu_compress.py:/ros2_ws/gpu_compress.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: ["bash", "-c", "source /opt/ros/jazzy/setup.bash && python3 /ros2_ws/gpu_compress.py --ros-args -p input_topic:=/thermal/camera1/image_raw -p output_topic:=/thermal/camera1/image_raw/compressed"]
    profiles: [thermal, sensors, dev, full]

  compress-thermal2:
    <<: *common
    image: localhost/bess-thermal:jazzy
    container_name: compress-thermal2
    environment:
      <<: *common-env
    volumes:
      - ./containers/cameras/gpu_compress.py:/ros2_ws/gpu_compress.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: ["bash", "-c", "source /opt/ros/jazzy/setup.bash && python3 /ros2_ws/gpu_compress.py --ros-args -p input_topic:=/thermal/camera2/image_raw -p output_topic:=/thermal/camera2/image_raw/compressed"]
    profiles: [thermal, sensors, dev, full]

  compress-thermal3:
    <<: *common
    image: localhost/bess-thermal:jazzy
    container_name: compress-thermal3
    environment:
      <<: *common-env
    volumes:
      - ./containers/cameras/gpu_compress.py:/ros2_ws/gpu_compress.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: ["bash", "-c", "source /opt/ros/jazzy/setup.bash && python3 /ros2_ws/gpu_compress.py --ros-args -p input_topic:=/thermal/camera3/image_raw -p output_topic:=/thermal/camera3/image_raw/compressed"]
    profiles: [thermal, sensors, dev, full]

  compress-thermal4:
    <<: *common
    image: localhost/bess-thermal:jazzy
    container_name: compress-thermal4
    environment:
      <<: *common-env
    volumes:
      - ./containers/cameras/gpu_compress.py:/ros2_ws/gpu_compress.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: ["bash", "-c", "source /opt/ros/jazzy/setup.bash && python3 /ros2_ws/gpu_compress.py --ros-args -p input_topic:=/thermal/camera4/image_raw -p output_topic:=/thermal/camera4/image_raw/compressed"]
    profiles: [thermal, sensors, dev, full]

  compress-lucid1:
    <<: *common
    image: localhost/bess-gpu-compress:jazzy
    container_name: compress-lucid1
    volumes:
      - ./containers/cameras/gpu_compress_cuda.py:/ros2_ws/gpu_compress_cuda.py:ro
      - ./containers/cameras/nvjpeg_encoder.py:/ros2_ws/nvjpeg_encoder.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: ["bash", "-c", "source /opt/ros/humble/setup.bash && python3 /ros2_ws/gpu_compress_cuda.py --ros-args -p input_topic:=/lucid1/camera_driver/image_raw -p output_topic:=/lucid1/camera_driver/image_raw/compressed"]
    profiles: [lucid, rgb, sensors, dev, full]

  compress-blackfly1:
    <<: *common
    image: localhost/bess-gpu-compress:jazzy
    container_name: compress-blackfly1
    environment:
      <<: *common-env
    volumes:
      - ./containers/cameras/gpu_compress_cuda.py:/ros2_ws/gpu_compress_cuda.py:ro
      - ./containers/cameras/nvjpeg_encoder.py:/ros2_ws/nvjpeg_encoder.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: ["bash", "-c", "source /opt/ros/humble/setup.bash && python3 /ros2_ws/gpu_compress_cuda.py --ros-args -p input_topic:=/blackfly/camera1/blackfly_camera/image_raw -p output_topic:=/blackfly/camera1/blackfly_camera/image_raw/compressed"]
    profiles: [blackfly, rgb, sensors, dev, full]

  compress-blackfly2:
    <<: *common
    image: localhost/bess-gpu-compress:jazzy
    container_name: compress-blackfly2
    environment:
      <<: *common-env
    volumes:
      - ./containers/cameras/gpu_compress_cuda.py:/ros2_ws/gpu_compress_cuda.py:ro
      - ./containers/cameras/nvjpeg_encoder.py:/ros2_ws/nvjpeg_encoder.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: ["bash", "-c", "source /opt/ros/humble/setup.bash && python3 /ros2_ws/gpu_compress_cuda.py --ros-args -p input_topic:=/blackfly/camera2/blackfly_camera/image_raw -p output_topic:=/blackfly/camera2/blackfly_camera/image_raw/compressed"]
    profiles: [blackfly, rgb, sensors, dev, full]

  # ===========================================================================
  # THERMAL PROCESSING
  # ===========================================================================
  thermal-colormap:
    <<: *common
    image: localhost/bess-thermal:jazzy
    container_name: thermal-colormap
    volumes:
      - ./dockerfiles/thermal/thermal_colormap_node.py:/ros2_ws/thermal_colormap_node.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash
        exec python3 /ros2_ws/thermal_colormap_node.py
    profiles:
      - thermal
      - sensors
      - dev
      - full

  # ===========================================================================
  # VISUALIZATION
  # ===========================================================================
  foxglove:
    <<: *common
    image: localhost/bess-foxglove:jazzy
    container_name: foxglove
    volumes:
      - ./config/certs:/certs:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
    environment:
      <<: *common-env
    command: >
      bash -c "source /opt/ros/jazzy/setup.bash &&
               export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp &&
               export CYCLONEDDS_URI=file:///config/cyclonedds.xml &&
               ros2 launch foxglove_bridge foxglove_bridge_launch.xml port:=8765 address:=0.0.0.0 tls:=false"
    healthcheck:
      test: ["CMD", "pgrep", "-x", "foxglove_bridge"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - viz
      - dev
      - full

  # ===========================================================================
  # SLAM (from original compose - kept for reference)
  # ===========================================================================
  glim:
    image: glim-ros2:humble
    container_name: glim
    network_mode: host
    ipc: host
    environment:
      ROS_DOMAIN_ID: "0"
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      CYCLONEDDS_URI: file:///config/cyclonedds.xml
      CUDA_VISIBLE_DEVICES: ""
      NVIDIA_VISIBLE_DEVICES: ""
      GLIM_DATA_PATH: /usr/local/share/glim
    volumes:
      - ./config/glim:/config:ro
      - ./maps:/maps:rw
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               ros2 run glim_ros glim_rosnode --ros-args -p config_path:=/config"
    # DEPRECATED on Thor: GLIM output is too sparse on the Ouster OS1-128
    # stream compared to DLIO / FAST-LIO2. Kept as a reference profile so
    # bags can still be reprocessed against it, but not started as part of
    # the default `slam` / `full` stacks.
    profiles:
      - glim-deprecated
    restart: unless-stopped

  kiss-icp:
    <<: *common
    image: localhost/bess-kiss-icp:jazzy
    container_name: kiss-icp
    volumes:
      - ./config/kiss_icp.yaml:/config/kiss_icp.yaml:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: >
      bash -c "source /opt/ros/jazzy/setup.bash &&
               source /ros2_ws/install/setup.bash &&
               ros2 launch kiss_icp odometry.launch.py
               topic:=/ouster/points
               visualize:=false"
    profiles:
      - kiss
      - dev

  # ===========================================================================
  # SLAM - DLIO (Direct LiDAR-Inertial Odometry)
  # ===========================================================================
  dlio:
    <<: *common
    image: localhost/bess-dlio:jazzy
    container_name: dlio
    mem_limit: 16g
    memswap_limit: 16g
    oom_kill_disable: false
    volumes:
      - ./config/dlio/dlio_thor.yaml:/ros2_ws/dlio_thor.yaml:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - /home/thor/recordings:/data:rw
    command:
      - bash
      - -c
      - |
        apt-get update && apt-get install -y ros-jazzy-rmw-cyclonedds-cpp >/dev/null 2>&1 || true
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        echo "[dlio] Starting DLIO with Ouster OS1-128 + GQ7 IMU..."
        cp /ros2_ws/dlio_thor.yaml /ros2_ws/install/direct_lidar_inertial_odometry/share/direct_lidar_inertial_odometry/cfg/dlio.yaml
        cp /ros2_ws/dlio_thor.yaml /ros2_ws/install/direct_lidar_inertial_odometry/share/direct_lidar_inertial_odometry/cfg/params.yaml
        ros2 launch direct_lidar_inertial_odometry dlio.launch.py \
          pointcloud_topic:=/ouster/points \
          imu_topic:=/imu/data \
          rviz:=false &
        LAUNCH_PID=$$!
        sleep 20
        while kill -0 $$LAUNCH_PID 2>/dev/null; do
          if ! pgrep -x dlio_odom_node >/dev/null; then
            echo "[dlio] dlio_odom_node died - terminating launch for restart"
            kill -TERM $$LAUNCH_PID 2>/dev/null || true
            sleep 2
            kill -KILL $$LAUNCH_PID 2>/dev/null || true
            exit 1
          fi
          sleep 3
        done
        wait $$LAUNCH_PID
        exit $$?
    healthcheck:
      <<: *healthcheck-ros2
      # Check odom_node (not map_node) — odom_node is the process that dies
      # on time-sync faults and heap corruption; map_node stays alive longer
      # and hides the failure from the healthcheck, leaving the container
      # "healthy" with SLAM actually dead.
      test: ["CMD", "pgrep", "-x", "dlio_odom_node"]
    profiles:
      - slam
      - dlio
      - full

  # ===========================================================================
  # FAST-LIO2 — Tightly-coupled LiDAR-inertial odometry (ROS 2 Jazzy)
  # Ouster OS1-128 + MicroStrain GQ7. Runs alongside DLIO as second LIO stack.
  # GLIM deprecated (too sparse) — FAST-LIO2 + DLIO are the primary LIOs.
  # ===========================================================================
  fast-lio:
    <<: *common
    image: localhost/bess-fast-lio:jazzy
    container_name: fast-lio
    mem_limit: 16g
    memswap_limit: 16g
    volumes:
      - ./containers/fast-lio/fast_lio_single.yaml:/ros2_ws/config/fast_lio_single.yaml:ro
      - ./containers/fast-lio/launch_fast_lio_single.py:/ros2_ws/launch_fast_lio_single.py:ro
      - ./containers/fast-lio/imu_guard.py:/ros2_ws/imu_guard.py:ro
      - ./containers/fast-lio/scancontext_node.py:/ros2_ws/scancontext_node.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - /home/thor/recordings:/data:rw
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "fastlio_mapping"]
    profiles:
      - slam
      - fast-lio
      - full

  # ===========================================================================
  # RECORDING
  # ===========================================================================
  recorder:
    <<: *common
    image: localhost/bess-ouster:jazzy
    container_name: recorder
    user: "1000:1000"
    volumes:
      - /home/thor/bess/data/cache:/recordings:rw
      - /home/thor/rosbag_qos.yaml:/rosbag_qos.yaml:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    working_dir: /recordings
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S)_$$$$
        exec ros2 bag record \
          --output /recordings/soak_$${TIMESTAMP} \
          --storage mcap \
          --qos-profile-overrides-path /rosbag_qos.yaml \
          --max-cache-size 500000000 \
          --max-bag-size 50000000000 \
          /ouster/points \
          /ouster/points2 \
          /ouster/imu \
          /ouster/metadata \
          /ouster/nearir_image \
          /ouster/range_image \
          /ouster/range_image2 \
          /ouster/reflec_image \
          /ouster/reflec_image2 \
          /ouster/signal_image \
          /ouster/signal_image2 \
          /thermal/camera1/image_raw/compressed \
          /thermal/camera1/camera_info \
          /thermal/camera2/image_raw/compressed \
          /thermal/camera2/camera_info \
          /thermal/camera3/image_raw/compressed \
          /thermal/camera3/camera_info \
          /thermal/camera4/image_raw/compressed \
          /thermal/camera4/camera_info \
          /thermal/camera1/image_color \
          /thermal/camera2/image_color \
          /thermal/camera3/image_color \
          /thermal/camera4/image_color \
          /lucid1/camera_driver/image_raw/compressed \
          /lucid1/camera_driver/camera_info \
          /lucid2/camera_driver/image_raw/compressed \
          /lucid2/camera_driver/camera_info \
          /blackfly/camera1/blackfly_camera/image_raw/compressed \
          /blackfly/camera1/blackfly_camera/camera_info \
          /blackfly/camera1/blackfly_camera/meta \
          /blackfly/camera2/blackfly_camera/image_raw/compressed \
          /blackfly/camera2/blackfly_camera/camera_info \
          /blackfly/camera2/blackfly_camera/meta \
          /blackfly/camera1/blackfly_camera/image_masked/compressed \
          /blackfly/camera2/blackfly_camera/image_masked/compressed \
          /lucid1/camera_driver/image_masked/compressed \
          /lucid2/camera_driver/image_masked/compressed \
          /imu/data \
          /imu/data_guarded \
          /imu/mag \
          /imu/pressure \
          /ekf/odometry_earth \
          /ekf/odometry_map \
          /ekf/imu/data \
          /ekf/llh_position \
          /ekf/velocity \
          /ekf/dual_antenna_heading \
          /ekf/status \
          /gnss_1/llh_position \
          /gnss_1/velocity \
          /gnss_1/odometry_earth \
          /gnss_1/time \
          /gnss_2/llh_position \
          /gnss_2/velocity \
          /gnss_2/odometry_earth \
          /gnss_2/time \
          /mip/ekf/status \
          /mip/ekf/gnss_position_aiding_status \
          /mip/ekf/gnss_dual_antenna_status \
          /mip/ekf/aiding_measurement_summary \
          /mip/ekf/multi_antenna_offset_correction \
          /mip/gnss_1/fix_info \
          /mip/gnss_1/sbas_info \
          /mip/gnss_1/rf_error_detection \
          /mip/gnss_2/fix_info \
          /mip/gnss_2/sbas_info \
          /mip/gnss_2/rf_error_detection \
          /mip/gnss_corrections/rtk_corrections_status \
          /mip/sensor/overrange_status \
          /mip/sensor/temperature_statistics \
          /mip/system/built_in_test \
          /mip/system/time_sync_status \
          /environment/temperature \
          /environment/humidity \
          /nmea \
          /rtcm \
          /dlio/odom_node/odom \
          /dlio/odom_node/pose \
          /dlio/odom_node/path \
          /dlio/odom_node/pointcloud/deskewed \
          /dlio/odom_node/pointcloud/keyframe \
          /dlio/odom_node/keyframes \
          /slam/odometry \
          /slam/path \
          /slam/cloud_registered \
          /slam/cloud_registered_body \
          /tf \
          /tf_static \
          /rutx/gps/fix \
          /rutx/mobile/rsrp \
          /rutx/mobile/rsrq \
          /rutx/mobile/sinr \
          /rutx/mobile/rssi \
          /rutx/mobile/band \
          /rutx/mobile/conntype \
          /rutx/mobile/cellid \
          /rutx/mobile/operator \
          /diagnostics
    profiles:
      - record
    restart: "no"

  # ===========================================================================
  # PII MASKING (YOLOv8n GPU face/plate masking, RGB cameras)
  # Subscribes to raw RGB topics, publishes *_masked compressed topics that
  # downstream (SegFormer, extraction, recorder) consume.
  # ===========================================================================
  pii-mask:
    <<: *common
    image: localhost/bess-pii-mask:jazzy
    container_name: pii-mask
    environment:
      <<: *common-env
      YOLO_CONFIG_DIR: /tmp/Ultralytics
    volumes:
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
      - ./containers/pii-mask/pii_mask_node.py:/ros2_ws/pii_mask_node.py:ro
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-f", "pii_mask_node"]
    profiles:
      - pii
      - inference
      - full

  # ===========================================================================
  # SEGFORMER SEMANTIC SEGMENTATION (Cityscapes 19-class, GPU FP16)
  # Subscribes to PII-masked compressed topics, publishes class label maps
  # and colored overlays. ~800 MiB VRAM, shares GPU 0 with pii-mask.
  # ===========================================================================
  segformer:
    <<: *common
    image: localhost/bess-segformer:jazzy
    container_name: segformer
    volumes:
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
      - ./containers/segformer/segformer_node.py:/ros2_ws/segformer_node.py:ro
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-f", "segformer_node"]
    depends_on:
      - pii-mask
    profiles:
      - segformer
      - inference
      - full

  # ===========================================================================
  # EXTRACTION PIPELINE
  # Consumes SLAM odometry, GNSS, PII-masked RGB, thermal, LiDAR panoramas,
  # SLAM per-scan clouds. Produces session directory with RGB JPEGs, thermal
  # NPY, LiDAR images, per-scan LAS, trajectory NPZ, UPRN frame visibility JSON.
  # CPU-only — no GPU needed.
  # ===========================================================================
  extraction:
    <<: *common
    image: localhost/bess-extraction:jazzy
    container_name: extraction
    environment:
      <<: *common-env
      EXTRACTION_DIR: /data/extraction
      SPATIAL_DB: /data/spatial/bess_uprn.db
      CALIB_DIR: /config/cameras/calibration
    volumes:
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
      - ./config/extraction/cameras.yaml:/config/cameras.yaml:ro
      - ./config/cameras/calibration:/config/cameras/calibration:ro
      - /mnt/bess-usb/extraction:/data/extraction:rw
      - /mnt/bess-usb/spatial:/data/spatial:ro
      - ./containers/extraction/bess-extraction.py:/ros2_ws/bess-extraction.py:ro
    profiles:
      - extraction
      - full

  # ===========================================================================
  # RUTX50 5G / GPS TELEMETRY
  # Polls Teltonika RUTX50 API for mobile signal + GNSS position
  # ===========================================================================
  rutx:
    <<: *common
    image: localhost/bess-rutx:jazzy
    container_name: rutx
    volumes:
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "python3"]
    profiles:
      - telemetry
      - sensors
      - full

# ===========================================================================
# VOLUMES
# ===========================================================================
volumes:
  recordings:
    driver: local
  maps:
    driver: local
  models:
    driver: local
  data:
    driver: local
