            -p frame_rate:=5.0 \
            -p frame_rate_enable:=true \
            -p frame_rate_auto:=Off \
            -p exposure_auto:=Continuous \
            -p gain_auto:=Continuous \
            -p gev_scps_packet_size:=1400 \
