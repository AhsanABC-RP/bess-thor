  # ===========================================================================
  # PII MASKING (YOLOv8n GPU face/plate masking, RGB cameras)
  # Subscribes to raw RGB topics, publishes *_masked compressed topics that
  # downstream (SegFormer, extraction, recorder) consume.
  # ===========================================================================
  pii-mask:
    <<: *common
    image: localhost/bess-pii-mask:jazzy
    container_name: pii-mask
    environment:
      <<: *common-env
      YOLO_CONFIG_DIR: /tmp/Ultralytics
    volumes:
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
      - ./containers/pii-mask/pii_mask_node.py:/ros2_ws/pii_mask_node.py:ro
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-f", "pii_mask_node"]
    profiles:
      - pii
      - inference
      - full

  # ===========================================================================
  # SEGFORMER SEMANTIC SEGMENTATION (Cityscapes 19-class, GPU FP16)
  # Subscribes to PII-masked compressed topics, publishes class label maps
  # and colored overlays. ~800 MiB VRAM, shares GPU 0 with pii-mask.
  # ===========================================================================
  segformer:
    <<: *common
    image: localhost/bess-segformer:jazzy
    container_name: segformer
    volumes:
