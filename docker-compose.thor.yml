  # ===========================================================================
  # SLAM MAP ACCUMULATOR — bounded unified world map for Foxglove
  # Subscribes to /fast_lio/cloud_registered (FAST-LIO2 per-scan in camera_init
  # frame), voxel-hashes into a bounded grid, republishes /fast_lio/map_voxel
  # on a 2s timer with TRANSIENT_LOCAL durability so late subscribers latch on.
  # This replaces FAST-LIO2's native publish.map_en, which accumulates
  # unbounded and produces 100+ MB messages that choke CycloneDDS fragment
  # reassembly (killing delivery of every other SLAM topic).
  # ===========================================================================
  slam-map-accumulator:
    <<: *common
    image: localhost/bess-ouster:jazzy
    container_name: slam-map-accumulator
    volumes:
      - ./scripts/slam_map_accumulator.py:/ros2_ws/slam_map_accumulator.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        exec python3 /ros2_ws/slam_map_accumulator.py \
          --ros-args \
          -p input_topic:=/fast_lio/cloud_registered \
          -p output_topic:=/fast_lio/map_voxel \
          -p frame_id:=camera_init \
          -p voxel_size:=0.12 \
          -p max_voxels:=4000000 \
          -p publish_period_sec:=2.0
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-f", "slam_map_accumulator"]
    profiles:
      - slam
      - full

  # ===========================================================================
  # RECORDING
  # ===========================================================================
  recorder:
    <<: *common
    image: localhost/bess-ouster:jazzy
    container_name: recorder
    user: "1000:1000"
    volumes:
      # TEMP: /mnt/bess-usb offline (car mounting) — writing to Thor NVMe with
      # rotating 5-min bag segments + 48 GB total cap. Switch back to
      # /mnt/bess-usb/bags once the HighPoint RM110 is reconnected.
      - /home/thor/recordings/tmp:/recordings:rw
      - /home/thor/rosbag_qos.yaml:/rosbag_qos.yaml:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    working_dir: /recordings
    environment:
      # 100 GB soft cap on rolling bag dir. Pruner (below) trims oldest splits
      # every 10s while total > CAP_BYTES. Raised from 40 GB after 2026-04-14
      # NVMe ENOSPC incident wedged Claude Code Bash tool.
      CAP_BYTES: "100000000000"
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash
        mkdir -p /recordings/rolling
        echo "[recorder] ring-buffer mode cap=$${CAP_BYTES}B dir=/recordings/rolling"
        # Background pruner: every 10s, delete oldest .mcap splits while over cap.
        # Never deletes the newest split (the one currently being written).
        (
          while true; do
            sleep 10
            dir=/recordings/rolling
            total=$$(du -sb "$$dir" 2>/dev/null | awk '{print $$1}')
            [ -z "$$total" ] && continue
            while [ "$$total" -gt "$$CAP_BYTES" ]; do
              count=$$(ls -1 "$$dir"/*.mcap 2>/dev/null | wc -l)
              [ "$$count" -le 1 ] && break
              victim=$$(ls -1rt "$$dir"/*.mcap 2>/dev/null | head -1)
              [ -z "$$victim" ] && break
              echo "[cleanup] pruning $$victim (total=$$total cap=$$CAP_BYTES)"
              rm -f "$$victim"
              total=$$(du -sb "$$dir" 2>/dev/null | awk '{print $$1}')
            done
          done
        ) &
        # Start fresh bag directory each container start (old one gets wiped so metadata is consistent)
        rm -rf /recordings/rolling
        mkdir -p /recordings/rolling
        exec ros2 bag record \
          --output /recordings/rolling/bag \
          --storage mcap \
          --qos-profile-overrides-path /rosbag_qos.yaml \
          --max-cache-size 500000000 \
          --max-bag-size 5000000000 \
          /ouster/points \
