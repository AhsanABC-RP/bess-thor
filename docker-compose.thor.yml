  # ===========================================================================
  # VISUALIZATION
  # ===========================================================================
  foxglove:
    <<: *common
    image: localhost/bess-foxglove:jazzy
    container_name: foxglove
    volumes:
      - ./config/certs:/certs:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
    environment:
      <<: *common-env
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        exec ros2 launch foxglove_bridge foxglove_bridge_launch.xml port:=8765 address:=0.0.0.0 tls:=true certfile:=/certs/cert.pem keyfile:=/certs/key.pem
    healthcheck:
      test: ["CMD", "pgrep", "-x", "foxglove_bridge"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - viz
      - dev
      - full

  # Plain-ws Foxglove bridge for the **desktop app** over Tailscale/LAN.
  # Tailscale already encrypts link traffic, so the TLS layer on port 8765 is
  # pure CPU overhead for big point clouds. This second bridge on 8766 is
  # ws://, not wss://, and is the fast path for native desktop Foxglove.
  # Browsers on app.foxglove.dev still need the TLS bridge on 8765.
  foxglove-local:
    <<: *common
    image: localhost/bess-foxglove:jazzy
    container_name: foxglove-local
    volumes:
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
    environment:
      <<: *common-env
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        exec ros2 launch foxglove_bridge foxglove_bridge_launch.xml \
          port:=8766 address:=0.0.0.0 tls:=false \
          send_buffer_limit:=100000000 \
          max_qos_depth:=1
    healthcheck:
      test: ["CMD", "pgrep", "-x", "foxglove_bridge"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - viz
      - dev
      - full

  # ===========================================================================
  # SLAM (from original compose - kept for reference)
  # ===========================================================================
  glim:
    image: glim-ros2:humble-cyclone
    container_name: glim
    network_mode: host
    ipc: host
    environment:
      ROS_DOMAIN_ID: "0"
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      CYCLONEDDS_URI: file:///dds/cyclonedds.xml
      CUDA_VISIBLE_DEVICES: ""
      NVIDIA_VISIBLE_DEVICES: ""
      GLIM_DATA_PATH: /usr/local/share/glim
    volumes:
      - ./config/glim:/config:ro
      - ./maps:/maps:rw
      - ./config/cyclonedds.xml:/dds/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/dds/fastrtps.xml:ro
    command:
      - bash
      - -c
      - |
        set -e
        source /opt/ros/humble/setup.bash
        # The Ouster BMI085 (os_imu) is co-located with the lidar head, so the
        # base_link extrinsic is identity. GLIM's built-in rviz viewer needs
        # os_imu → glim_base_link in the TF tree before it will render — add
        # it as a sidecar static broadcaster. glim_base_link only gets one
        # parent (os_imu) to avoid a TF double-parent conflict.
        ros2 run tf2_ros static_transform_publisher 0 0 0 0 0 0 os_imu glim_base_link &
        exec ros2 run glim_ros glim_rosnode --ros-args -p config_path:=/config
    profiles:
      - glim-deprecated
      - slam
      - full
    restart: "no"

  kiss-icp:
    <<: *common
    image: localhost/bess-kiss-icp:jazzy
    container_name: kiss-icp
    volumes:
      - ./config/kiss_icp.yaml:/config/kiss_icp.yaml:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: >
      bash -c "source /opt/ros/jazzy/setup.bash &&
               source /ros2_ws/install/setup.bash &&
               ros2 launch kiss_icp odometry.launch.py
               topic:=/ouster/points
               visualize:=false"
    profiles:
      - kiss
      - dev

  # ===========================================================================
  # SLAM - DLIO (Direct LiDAR-Inertial Odometry)
  # ===========================================================================
  dlio:
    <<: *common
    image: localhost/bess-dlio:jazzy
    container_name: dlio
    mem_limit: 16g
    memswap_limit: 16g
    oom_kill_disable: false
    volumes:
      - ./config/dlio/dlio_thor.yaml:/ros2_ws/dlio_thor.yaml:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - /home/thor/recordings:/data:rw
    command:
      - bash
      - -c
      - |
        apt-get update && apt-get install -y ros-jazzy-rmw-cyclonedds-cpp >/dev/null 2>&1 || true
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        echo "[dlio] Starting DLIO with Ouster OS1-128 + /ouster/imu (built-in BMI085)..."
        # Use the Ouster-embedded BMI085 IMU rather than the GQ7:
        #  - Monotonic timestamps (no driver-side rewinds that broke FAST-LIO2)
        #  - Same host clock as /ouster/points in TIME_FROM_ROS_TIME mode
        #  - Co-located with the lidar → identity lidar<->imu extrinsic is correct
        # This mirrors the fix applied to fast-lio for the same divergence class.
        cp /ros2_ws/dlio_thor.yaml /ros2_ws/install/direct_lidar_inertial_odometry/share/direct_lidar_inertial_odometry/cfg/dlio.yaml
        cp /ros2_ws/dlio_thor.yaml /ros2_ws/install/direct_lidar_inertial_odometry/share/direct_lidar_inertial_odometry/cfg/params.yaml
        # Patch the upstream launch file to remap dlio_map_node's /map topic
        # into the /dlio namespace so it doesn't pollute the global topic list
        # alongside FAST-LIO2 (/fast_lio/map_voxel) and GLIM (/glim_ros/map).
        DLIO_LAUNCH=/ros2_ws/install/direct_lidar_inertial_odometry/share/direct_lidar_inertial_odometry/launch/dlio.launch.py
        if ! grep -q "dlio/map" "$$DLIO_LAUNCH"; then
          sed -i "/'keyframes', 'dlio\/odom_node\/pointcloud\/keyframe'/a\\            ('map', 'dlio/map')," "$$DLIO_LAUNCH"
          echo "[dlio] patched dlio.launch.py: /map -> /dlio/map"
        fi
        ros2 launch direct_lidar_inertial_odometry dlio.launch.py \
          pointcloud_topic:=/ouster/points \
          imu_topic:=/ouster/imu \
          rviz:=false &
        LAUNCH_PID=$$!
        sleep 20
        while kill -0 $$LAUNCH_PID 2>/dev/null; do
          if ! pgrep -x dlio_odom_node >/dev/null; then
            echo "[dlio] dlio_odom_node died - terminating launch for restart"
            kill -TERM $$LAUNCH_PID 2>/dev/null || true
            sleep 2
            kill -KILL $$LAUNCH_PID 2>/dev/null || true
            exit 1
          fi
          sleep 3
        done
        wait $$LAUNCH_PID
        exit $$?
    healthcheck:
      <<: *healthcheck-ros2
      # Check odom_node (not map_node) — odom_node is the process that dies
      # on time-sync faults and heap corruption; map_node stays alive longer
      # and hides the failure from the healthcheck, leaving the container
      # "healthy" with SLAM actually dead.
      test: ["CMD", "pgrep", "-x", "dlio_odom_node"]
    profiles:
      - slam
      - dlio
      - full

  # ===========================================================================
  # FAST-LIO2 — Tightly-coupled LiDAR-inertial odometry (ROS 2 Jazzy)
  # Ouster OS1-128 + MicroStrain GQ7. Runs alongside DLIO as second LIO stack.
  # GLIM deprecated (too sparse) — FAST-LIO2 + DLIO are the primary LIOs.
  # ===========================================================================
  fast-lio:
    <<: *common
    image: localhost/bess-fast-lio:jazzy
    container_name: fast-lio
    mem_limit: 16g
    memswap_limit: 16g
    volumes:
      - ./containers/fast-lio/fast_lio_single.yaml:/ros2_ws/config/fast_lio_single.yaml:ro
      - ./containers/fast-lio/launch_fast_lio_single.py:/ros2_ws/launch_fast_lio_single.py:ro
      - ./containers/fast-lio/imu_guard.py:/ros2_ws/imu_guard.py:ro
