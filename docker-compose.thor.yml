        source /ros2_ws/install/setup.bash 2>/dev/null || true
        while true; do
          echo "[lucid2] Starting Lucid Atlas #2..."
          python3 /ros2_ws/lucid_node.py --ros-args \
            -p camera_ip:=169.254.20.14 \
            -p camera_name:=lucid2 \
            -p frame_id:=lucid2_optical_frame \
            -p fps:=3.0 \
            -p binning:=4 \
            -p exposure_us:=-1.0 \
            -p gain_db:=-1.0 || true
          echo "[lucid2] Exited, restarting in 5s..."
          sleep 5
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "/usr/local/bin/healthcheck_topic.sh", "/lucid2/camera_driver/image_raw", "1"]
    profiles:
      - lucid
      - rgb
      - sensors
      - dev
      - full

  compress-lucid2:
    <<: *common
    image: localhost/bess-gpu-compress:jazzy
    container_name: compress-lucid2
    volumes:
      - ./containers/cameras/gpu_compress_cuda.py:/ros2_ws/gpu_compress_cuda.py:ro
      - ./containers/cameras/nvjpeg_encoder.py:/ros2_ws/nvjpeg_encoder.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
    command: ["bash", "-c", "source /opt/ros/humble/setup.bash && python3 /ros2_ws/gpu_compress_cuda.py --ros-args -p input_topic:=/lucid2/camera_driver/image_raw -p output_topic:=/lucid2/camera_driver/image_raw/compressed"]
    profiles: [lucid, rgb, sensors, dev, full]

  # ===========================================================================
  # SENSORS - Blackfly S (via Spinnaker)
  # ===========================================================================
  blackfly1:
    <<: *common
    image: localhost/bess-blackfly:humble
    container_name: blackfly1
    volumes:
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/blackfly_s_thor.yaml:/config/blackfly_s_thor.yaml:ro
      - ./scripts/healthcheck_topic.sh:/usr/local/bin/healthcheck_topic.sh:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/humble/setup.bash
        source /ros2_ws/install/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        while true; do
          echo "[blackfly1] Starting Blackfly S #1 C++ driver (SN 25073269)..."
          ros2 run spinnaker_camera_driver camera_driver_node --ros-args \
            -r __node:=blackfly_camera -r __ns:=/blackfly/camera1 \
            -p serial_number:="'25073269'" \
            -p frame_id:=blackfly1_optical_frame \
            -p parameter_file:=/config/blackfly_s_thor.yaml \
            -p pixel_format:=BayerRG8 \
            -p frame_rate:=5.0 \
            -p frame_rate_enable:=true \
            -p frame_rate_auto:=Off \
            -p exposure_auto:=Continuous \
            -p gain_auto:=Continuous \
            -p device_link_throughput_limit:=125000000 \
            -p gev_scps_packet_size:=1400 \
            -p buffer_queue_size:=10 \
            -p trigger_mode:=Off \
            -p use_ieee_1588:=true \
            -p max_ieee_1588_offset:=0.001 \
            -p adjust_timestamp:=false \
            -p compute_brightness:=true \
            -p chunk_mode_active:=true \
            -p chunk_selector_frame_id:=FrameID \
            -p chunk_enable_frame_id:=true \
            -p chunk_selector_exposure_time:=ExposureTime \
            -p chunk_enable_exposure_time:=true \
            -p chunk_selector_gain:=Gain \
            -p chunk_enable_gain:=true \
            -p chunk_selector_timestamp:=Timestamp \
            -p chunk_enable_timestamp:=true \
            -p gev_ieee_1588:=true \
            -p gev_ieee_1588_mode:=SlaveOnly || true
          echo "[blackfly1] Exited, waiting 30s for GigE heartbeat to clear..."
          sleep 30
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "/usr/local/bin/healthcheck_topic.sh", "/blackfly/camera1/blackfly_camera/image_raw", "2"]
    profiles:
      - blackfly
      - rgb
      - sensors
      - dev
      - full

  blackfly2:
