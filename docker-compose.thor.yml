  # ===========================================================================
  # EXTRACTION PIPELINE
  # Consumes SLAM odometry, GNSS, PII-masked RGB, thermal, LiDAR panoramas,
  # SLAM per-scan clouds. Produces session directory with RGB JPEGs, thermal
  # NPY, LiDAR images, per-scan LAS, trajectory NPZ, UPRN frame visibility JSON.
  # CPU-only — no GPU needed.
  # ===========================================================================
  extraction:
    <<: *common
    image: localhost/bess-extraction:jazzy
    container_name: extraction
    environment:
      <<: *common-env
      EXTRACTION_DIR: /data/extraction
      SPATIAL_DB: /data/spatial/bess_uprn.db
      CALIB_DIR: /config/cameras/calibration
    volumes:
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
      - ./config/extraction/cameras.yaml:/config/cameras.yaml:ro
      - ./config/cameras/calibration:/config/cameras/calibration:ro
      - /mnt/bess-usb/extraction:/data/extraction:rw
      - /mnt/bess-usb/spatial:/data/spatial:ro
      - ./containers/extraction/bess-extraction.py:/ros2_ws/bess-extraction.py:ro
    profiles:
      - extraction
      - full

  # ===========================================================================
  # RUTX50 5G / GPS TELEMETRY
  # Polls Teltonika RUTX50 API for mobile signal + GNSS position
  # ===========================================================================
  rutx:
    <<: *common
    image: localhost/bess-rutx:jazzy
    container_name: rutx
    volumes:
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "pgrep", "-x", "python3"]
    profiles:
      - telemetry
      - sensors
      - full

# ===========================================================================
# VOLUMES
# ===========================================================================
volumes:
  recordings:
    driver: local
  maps:
    driver: local
  models:
    driver: local
  data:
    driver: local
