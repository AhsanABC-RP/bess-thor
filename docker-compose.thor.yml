# =============================================================================
# BESS Thor - Unified ROS2 Sensing Stack
# Thor Dev Kit (Grace Blackwell, ARM64) - Ubuntu 24.04 / CUDA 13.0
# =============================================================================
#
# Based on bess_platform production patterns with:
# - CycloneDDS (better for large messages than FastDDS)
# - Health checks on all sensors
# - Lucid Atlas 64MP support
# - Full thermal stack (A6701 x2 + A70 x2)
#
# USAGE:
#   docker compose -f docker-compose.thor.yml --profile sensors up -d
#   docker compose -f docker-compose.thor.yml --profile full up -d
#
# =============================================================================

# Common configuration - CycloneDDS instead of FastDDS
x-common: &common
  runtime: nvidia
  network_mode: host
  ipc: host
  privileged: true
  environment: &common-env
    ROS_DOMAIN_ID: "0"
    RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    CYCLONEDDS_URI: file:///config/cyclonedds.xml
    FASTRTPS_DEFAULT_PROFILES_FILE: /config/fastrtps.xml
    NVIDIA_VISIBLE_DEVICES: all
    NVIDIA_DRIVER_CAPABILITIES: all
    CUDA_VISIBLE_DEVICES: "0"
  # Do NOT set restart: unless-stopped here. On boot, docker.service
  # restarts every unless-stopped container simultaneously, and the
  # race (27+ containers competing for GPU/CUDA init, USB probes,
  # GigE SDK discovery, PTP clients, host network) wedges the kernel
  # long enough for the Tegra hw watchdog (/dev/watchdog0) to fire.
  # That caused the 2026-04-15 rapid-reboot loop (not the systemd
  # chain as previously attributed). Start the stack explicitly with
  # `docker compose -f docker-compose.thor.yml --profile full up -d`
  # after boot — session-level retry loops inside each container
  # already handle crash recovery.
  restart: "no"

x-healthcheck-ros2: &healthcheck-ros2
  interval: 30s
  timeout: 20s
  retries: 4
  # Sensor data-flow healthchecks subscribe to a topic for ~4s. Cold boot
  # gives drivers time to enumerate/calibrate (Spinnaker thermals: ~30s,
  # Lucid Arena: ~15s, Blackfly GigE heartbeat: ~20s) before failures count.
  start_period: 120s

services:
  # ===========================================================================
  # SENSORS - LiDAR
  # ===========================================================================
  ouster:
    <<: *common
    image: localhost/bess-ouster:jazzy
    container_name: ouster
    volumes:
      - ./config/ouster/params.yaml:/params.yaml:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
      - ./scripts/healthcheck_topic.sh:/usr/local/bin/healthcheck_topic.sh:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash
        while true; do
          echo "[ouster] Starting driver..."
          ros2 launch ouster_ros driver.launch.py \
            params_file:=/params.yaml viz:=false || true
          echo "[ouster] Driver exited, restarting in 10s..."
          sleep 10
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "/usr/local/bin/healthcheck_topic.sh", "/ouster/points", "1"]
    profiles:
      - lidar
      - sensors
      - dev
      - full

  # ===========================================================================
  # SENSORS - IMU (MicroStrain GQ7 via direct USB — main: /dev/ttyACM0, aux: /dev/ttyACM1)
  # ===========================================================================
  microstrain:
    <<: *common
    image: localhost/bess-microstrain:jazzy
    container_name: microstrain
    # Mount stable udev symlinks (see /etc/udev/rules.d/99-microstrain.rules).
    # The GQ7 USB device numbers (ttyACM0/1/2…) shuffle on every replug or
    # USB hub re-enumeration; pinning by symlink survives that. udev resolves
    # the symlinks at compose-time so the container sees /dev/ttyACM<N>.
    devices:
      - /dev/microstrain_main:/dev/microstrain_main
      - /dev/microstrain_aux:/dev/microstrain_aux
    volumes:
      - ./config:/ros2_ws/config:ro
      - ./config/microstrain/launch_imu.py:/ros2_ws/launch_imu.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
      - ./scripts/healthcheck_topic.sh:/usr/local/bin/healthcheck_topic.sh:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash
        # Docker's --device resolves host symlinks at startup, so the stable
        # /dev/microstrain_{main,aux} names are NOT preserved inside the
        # container. Resolve which ttyACM is which at startup by reading the
        # USB serial via sysfs (main has prefix "0000", aux has "2-00") and
        # export the matching paths into MAIN_PORT / AUX_PORT.
        resolve_port() {
          local prefix=$$1
          for dev in /dev/ttyACM*; do
            local base
            base=$$(basename "$$dev")
            local serial
            serial=$$(cat "/sys/class/tty/$$base/device/../serial" 2>/dev/null || true)
            if [[ $$serial == $${prefix}* ]]; then
              echo "$$dev"
              return 0
            fi
          done
          return 1
        }
        # MIP SDK occasionally catches a ttyACM HUP and stays alive in an
        # error spin loop without publishing — wrap in a while-true so the
        # data-flow healthcheck can fail and Docker restarts the container.
        while true; do
          MAIN_PORT=$$(resolve_port "0000") || { echo "[microstrain] no ttyACM with serial 0000* (main)"; sleep 5; continue; }
          AUX_PORT=$$(resolve_port "2-00")  || { echo "[microstrain] no ttyACM with serial 2-00* (aux)";  sleep 5; continue; }
          echo "[microstrain] Starting MIP driver: main=$$MAIN_PORT aux=$$AUX_PORT"
          ros2 launch /ros2_ws/launch_imu.py port:=$$MAIN_PORT aux_port:=$$AUX_PORT || true
          echo "[microstrain] launch exited, restarting in 5s..."
          sleep 5
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "/usr/local/bin/healthcheck_topic.sh", "/imu/data", "10"]
    profiles:
      - imu
      - sensors
      - dev

  # ===========================================================================
  # NTRIP RTK Corrections Client (SmartNET UK → /rtcm → microstrain aux)
  # ===========================================================================
  # Pulls RTCM3 corrections from uk.nrtk.eu:7801 (VRS mountpoint MSM_i-MAX),
  # subscribes to /gnss_1/llh_position for GGA feedback (VRS needs it), and
  # publishes rtcm_msgs/Message to /rtcm. The microstrain driver (which has
  # ntrip_interface_enable=true in params.yaml) is subscribed to /rtcm and
  # forwards RTCM bytes to the GQ7 aux port (/dev/ttyACM1).
  ntrip:
    <<: *common
    image: localhost/bess-microstrain:jazzy
    container_name: ntrip
    volumes:
      - ./config/ntrip/ntrip_ros2.py:/ros2_ws/ntrip_ros2.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
      - ./scripts/healthcheck_topic.sh:/usr/local/bin/healthcheck_topic.sh:ro
    environment:
      <<: *common-env
      NTRIP_HOST: uk.nrtk.eu
      NTRIP_PORT: "7801"
      NTRIP_MOUNTPOINT: MSM_iMAX
      NTRIP_USER: XRI003
      NTRIP_PASS: "23705"
      GGA_INTERVAL: "10"
      DEFAULT_LAT: "53.4437"
      DEFAULT_LON: "-0.7207"
      DEFAULT_ALT: "70.0"
    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash
        source /ros2_ws/install/setup.bash
        while true; do
          echo "[ntrip] Starting NTRIP client..."
          python3 /ros2_ws/ntrip_ros2.py || true
          echo "[ntrip] exited, restarting in 10s..."
          sleep 10
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "/usr/local/bin/healthcheck_topic.sh", "/rtcm", "0.5"]
    profiles:
      - imu
      - sensors
      - dev
      - full

  # ===========================================================================
  # SENSORS - Thermal MWIR (FLIR A6701 x2 via Spinnaker)
  # ===========================================================================
  thermal1:
    <<: *common
    image: localhost/bess-thermal-spinnaker:jazzy
    container_name: thermal1
    volumes:
      - ./dockerfiles/thermal/thermal_spinnaker_node_patched.py:/ros2_ws/thermal_spinnaker_node.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
      - ./scripts/healthcheck_topic.sh:/usr/local/bin/healthcheck_topic.sh:ro
    command:
      - bash
      - -c
      - |
        source /opt/ros/humble/setup.bash
        source /ros2_ws/install/setup.bash
        export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
        export CYCLONEDDS_URI=file:///config/cyclonedds.xml
        while true; do
          echo "[thermal1] Starting A6701 #1 (MAC 00:11:1c:05:8f:20)..."
          python3 /ros2_ws/thermal_spinnaker_node.py --ros-args \
            -r __ns:=/thermal/camera1 \
            -p frame_id:=thermal1_optical_frame \
            -p camera_mac:=00:11:1c:05:8f:20 || true
          echo "[thermal1] Exited, restarting in 5s..."
          sleep 5
        done
    healthcheck:
      <<: *healthcheck-ros2
      test: ["CMD", "/usr/local/bin/healthcheck_topic.sh", "/thermal/camera1/image_raw", "5"]
    profiles:
      - thermal
      - sensors
      - dev
      - full

  thermal2:
    <<: *common
    image: localhost/bess-thermal-spinnaker:jazzy
    container_name: thermal2
    volumes:
      - ./dockerfiles/thermal/thermal_spinnaker_node_patched.py:/ros2_ws/thermal_spinnaker_node.py:ro
      - ./config/cyclonedds.xml:/config/cyclonedds.xml:ro
      - ./config/fastrtps.xml:/config/fastrtps.xml:ro
